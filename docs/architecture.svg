<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 880" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="phase1Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#5A54E0"/>
    </linearGradient>
    <linearGradient id="phase1bGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ECDC4"/>
      <stop offset="100%" stop-color="#3DBDB5"/>
    </linearGradient>
    <linearGradient id="phase2Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#E85555"/>
    </linearGradient>
    <linearGradient id="memoryGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#F0C830"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#45B7D1"/>
      <stop offset="100%" stop-color="#3AA3BC"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowSm" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowGrey" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#9B9BC0"/>
    </marker>
    <marker id="arrowP1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#6C63FF"/>
    </marker>
    <marker id="arrowP1b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#4ECDC4"/>
    </marker>
    <marker id="arrowP2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#FF6B6B"/>
    </marker>
    <marker id="arrowMem" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#D4AA00"/>
    </marker>
    <!-- Clip paths for rounded header fills -->
    <clipPath id="clipP1"><rect x="50" y="270" width="310" height="42" rx="12"/></clipPath>
    <clipPath id="clipP1b"><rect x="415" y="270" width="310" height="42" rx="12"/></clipPath>
    <clipPath id="clipP2"><rect x="780" y="270" width="310" height="42" rx="12"/></clipPath>
    <clipPath id="clipOut"><rect x="350" y="540" width="440" height="38" rx="12"/></clipPath>
    <clipPath id="clipMem"><rect x="100" y="660" width="940" height="42" rx="12"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1140" height="880" rx="12" fill="#F8F9FA"/>

  <!-- ══════════════ Title ══════════════ -->
  <text x="570" y="40" text-anchor="middle" font-size="21" font-weight="700" fill="#2D3436">LLM-Label-Extractor  —  Pipeline Architecture</text>

  <!-- ══════════════ GEOmetadb ══════════════ -->
  <rect x="395" y="62" width="350" height="58" rx="10" fill="#E8E8F0" stroke="#B8B8D0" stroke-width="1.5" filter="url(#shadowSm)"/>
  <text x="570" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#4A4A6A">GEOmetadb.sqlite</text>
  <text x="570" y="104" text-anchor="middle" font-size="11" fill="#6A6A8A">NCBI Gene Expression Omnibus (~19 GB)</text>

  <!-- Arrow: GEOmetadb -> Discovery -->
  <line x1="570" y1="120" x2="570" y2="152" stroke="#9B9BC0" stroke-width="2" marker-end="url(#arrowGrey)"/>

  <!-- ══════════════ Platform Discovery ══════════════ -->
  <rect x="370" y="152" width="400" height="54" rx="10" fill="#F0EEFF" stroke="#B8B0F0" stroke-width="1.5" filter="url(#shadowSm)"/>
  <text x="570" y="176" text-anchor="middle" font-size="14" font-weight="700" fill="#5A50C0">Platform Discovery Engine</text>
  <text x="570" y="194" text-anchor="middle" font-size="11" fill="#7A70D0">Filter by species and technology</text>

  <!-- Splitting arrows: Discovery -> 3 Phases -->
  <line x1="570" y1="206" x2="570" y2="234" stroke="#9B9BC0" stroke-width="2"/>
  <line x1="205" y1="234" x2="935" y2="234" stroke="#9B9BC0" stroke-width="2"/>
  <line x1="205" y1="234" x2="205" y2="262" stroke="#6C63FF" stroke-width="2" marker-end="url(#arrowP1)"/>
  <line x1="570" y1="234" x2="570" y2="262" stroke="#4ECDC4" stroke-width="2" marker-end="url(#arrowP1b)"/>
  <line x1="935" y1="234" x2="935" y2="262" stroke="#FF6B6B" stroke-width="2" marker-end="url(#arrowP2)"/>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--                    PHASE 1: EXTRACT                       -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="50" y="270" width="310" height="220" rx="12" fill="white" stroke="#6C63FF" stroke-width="2"/>
  </g>
  <!-- Header fill (clipped to top rounded corners) -->
  <rect x="50" y="270" width="310" height="44" fill="url(#phase1Grad)" clip-path="url(#clipP1)"/>
  <rect x="50" y="300" width="310" height="14" fill="url(#phase1Grad)"/>
  <text x="205" y="298" text-anchor="middle" font-size="15" font-weight="700" fill="white">Phase 1: Extract</text>

  <!-- Description -->
  <text x="205" y="332" text-anchor="middle" font-size="11" fill="#4A4A6A">Raw label extraction from</text>
  <text x="205" y="348" text-anchor="middle" font-size="11" fill="#4A4A6A">GSM metadata + GSE context</text>

  <!-- Separator -->
  <line x1="72" y1="360" x2="338" y2="360" stroke="#EDEDF0" stroke-width="1"/>

  <!-- Key-value pairs (label left-aligned, value right-aligned within card) -->
  <text x="80" y="382" font-size="10.5" fill="#6C63FF" font-weight="600">Model</text>
  <text x="330" y="382" text-anchor="end" font-size="10.5" fill="#4A4A6A">gemma2:2b</text>

  <text x="80" y="400" font-size="10.5" fill="#6C63FF" font-weight="600">Speed</text>
  <text x="330" y="400" text-anchor="end" font-size="10.5" fill="#4A4A6A">~174 ms / sample</text>

  <text x="80" y="418" font-size="10.5" fill="#6C63FF" font-weight="600">Workers</text>
  <text x="330" y="418" text-anchor="end" font-size="10.5" fill="#4A4A6A">4 – 210 (fluid scaling)</text>

  <text x="80" y="436" font-size="10.5" fill="#6C63FF" font-weight="600">Checkpoint</text>
  <text x="330" y="436" text-anchor="end" font-size="10.5" fill="#4A4A6A">Every 5,000 samples</text>

  <text x="80" y="454" font-size="10.5" fill="#6C63FF" font-weight="600">Labels</text>
  <text x="330" y="454" text-anchor="end" font-size="10.5" fill="#4A4A6A">Tissue, Condition, Treatment</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--                   PHASE 1b: INFER                         -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="415" y="270" width="310" height="220" rx="12" fill="white" stroke="#4ECDC4" stroke-width="2"/>
  </g>
  <rect x="415" y="270" width="310" height="44" fill="url(#phase1bGrad)" clip-path="url(#clipP1b)"/>
  <rect x="415" y="300" width="310" height="14" fill="url(#phase1bGrad)"/>
  <text x="570" y="298" text-anchor="middle" font-size="15" font-weight="700" fill="white">Phase 1b: Infer</text>

  <text x="570" y="332" text-anchor="middle" font-size="11" fill="#4A4A6A">Re-infer Not Specified fields</text>
  <text x="570" y="348" text-anchor="middle" font-size="11" fill="#4A4A6A">from full GSE experiment context</text>

  <line x1="437" y1="360" x2="703" y2="360" stroke="#EDEDF0" stroke-width="1"/>

  <text x="445" y="382" font-size="10.5" fill="#3DBDB5" font-weight="600">Model</text>
  <text x="695" y="382" text-anchor="end" font-size="10.5" fill="#4A4A6A">gemma2:2b</text>

  <text x="445" y="400" font-size="10.5" fill="#3DBDB5" font-weight="600">Strategy</text>
  <text x="695" y="400" text-anchor="end" font-size="10.5" fill="#4A4A6A">KV-cached, 1 call per GSE</text>

  <text x="445" y="418" font-size="10.5" fill="#3DBDB5" font-weight="600">Targets</text>
  <text x="695" y="418" text-anchor="end" font-size="10.5" fill="#4A4A6A">Not Specified labels only</text>

  <text x="445" y="436" font-size="10.5" fill="#3DBDB5" font-weight="600">Benefit</text>
  <text x="695" y="436" text-anchor="end" font-size="10.5" fill="#4A4A6A">Amortized context loading</text>

  <text x="445" y="454" font-size="10.5" fill="#3DBDB5" font-weight="600">Input</text>
  <text x="695" y="454" text-anchor="end" font-size="10.5" fill="#4A4A6A">GSE summary + description</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--                   PHASE 2: COLLAPSE                       -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="780" y="270" width="310" height="220" rx="12" fill="white" stroke="#FF6B6B" stroke-width="2"/>
  </g>
  <rect x="780" y="270" width="310" height="44" fill="url(#phase2Grad)" clip-path="url(#clipP2)"/>
  <rect x="780" y="300" width="310" height="14" fill="url(#phase2Grad)"/>
  <text x="935" y="298" text-anchor="middle" font-size="15" font-weight="700" fill="white">Phase 2: Collapse</text>

  <text x="935" y="332" text-anchor="middle" font-size="11" fill="#4A4A6A">Normalize raw labels to</text>
  <text x="935" y="348" text-anchor="middle" font-size="11" fill="#4A4A6A">canonical cluster names</text>

  <line x1="802" y1="360" x2="1068" y2="360" stroke="#EDEDF0" stroke-width="1"/>

  <text x="810" y="382" font-size="10.5" fill="#E85555" font-weight="600">Engine</text>
  <text x="1060" y="382" text-anchor="end" font-size="10.5" fill="#4A4A6A">4-Tier Memory Agent</text>

  <text x="810" y="400" font-size="10.5" fill="#E85555" font-weight="600">Clusters</text>
  <text x="1060" y="400" text-anchor="end" font-size="10.5" fill="#4A4A6A">6,920 total mappings</text>

  <text x="810" y="418" font-size="10.5" fill="#E85555" font-weight="600">Checkpoint</text>
  <text x="1060" y="418" text-anchor="end" font-size="10.5" fill="#4A4A6A">Every 1,000 samples</text>

  <text x="810" y="436" font-size="10.5" fill="#E85555" font-weight="600">Categories</text>
  <text x="1060" y="436" text-anchor="end" font-size="10.5" fill="#4A4A6A">Tissue · Condition · Treatment</text>

  <text x="810" y="454" font-size="10.5" fill="#E85555" font-weight="600">Fallback</text>
  <text x="1060" y="454" text-anchor="end" font-size="10.5" fill="#4A4A6A">Deterministic rules</text>

  <!-- ══════════════ Converging arrows ══════════════ -->
  <line x1="205" y1="490" x2="205" y2="514" stroke="#6C63FF" stroke-width="2"/>
  <line x1="570" y1="490" x2="570" y2="514" stroke="#4ECDC4" stroke-width="2"/>
  <line x1="935" y1="490" x2="935" y2="514" stroke="#FF6B6B" stroke-width="2"/>
  <line x1="205" y1="514" x2="935" y2="514" stroke="#9B9BC0" stroke-width="2"/>
  <line x1="570" y1="514" x2="570" y2="534" stroke="#9B9BC0" stroke-width="2" marker-end="url(#arrowGrey)"/>

  <!-- ══════════════ Output Block ══════════════ -->
  <g filter="url(#shadow)">
    <rect x="350" y="540" width="440" height="78" rx="12" fill="white" stroke="#45B7D1" stroke-width="2"/>
  </g>
  <rect x="350" y="540" width="440" height="38" fill="url(#outputGrad)" clip-path="url(#clipOut)"/>
  <rect x="350" y="566" width="440" height="12" fill="url(#outputGrad)"/>
  <text x="570" y="565" text-anchor="middle" font-size="14" font-weight="700" fill="white">Output per Platform (CSV)</text>

  <text x="570" y="594" text-anchor="middle" font-size="10.5" fill="#4A4A6A">{GPL}_NS_repaired.csv</text>
  <text x="570" y="608" text-anchor="middle" font-size="10.5" fill="#4A4A6A">{GPL}_full_repaired.csv  ·  {GPL}_collapse_report.csv</text>

  <!-- ══════════════ Dashed link: Phase 2 → Memory ══════════════ -->
  <!-- Runs down the right side, outside the convergence area -->
  <line x1="1060" y1="490" x2="1060" y2="640" stroke="#D4AA00" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="1060" y1="640" x2="1044" y2="660" stroke="#D4AA00" stroke-width="1.5" marker-end="url(#arrowMem)"/>
  <text x="1072" y="580" font-size="9.5" fill="#B89A00" font-style="italic" writing-mode="tb">used by Phase 2</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--                   4-TIER MEMORY SYSTEM                    -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="100" y="660" width="940" height="200" rx="12" fill="white" stroke="#FFD93D" stroke-width="2"/>
  </g>
  <!-- Header -->
  <rect x="100" y="660" width="940" height="42" fill="url(#memoryGrad)" clip-path="url(#clipMem)"/>
  <rect x="100" y="690" width="940" height="12" fill="url(#memoryGrad)"/>
  <text x="570" y="688" text-anchor="middle" font-size="15" font-weight="700" fill="#5A4A00">4-Tier Memory Agent</text>

  <!-- Tier boxes — evenly spaced across 940px (100..1040) -->
  <!-- Tier 1 -->
  <rect x="128" y="716" width="200" height="60" rx="8" fill="#FFF8E1" stroke="#FFD93D" stroke-width="1.2"/>
  <text x="228" y="737" text-anchor="middle" font-size="12" font-weight="700" fill="#8B7000">Tier 1: Core</text>
  <text x="228" y="754" text-anchor="middle" font-size="10" fill="#6A6A8A">Top-50 labels injected</text>
  <text x="228" y="768" text-anchor="middle" font-size="10" fill="#6A6A8A">into every LLM prompt</text>

  <!-- Tier 2 -->
  <rect x="350" y="716" width="200" height="60" rx="8" fill="#FFF8E1" stroke="#FFD93D" stroke-width="1.2"/>
  <text x="450" y="737" text-anchor="middle" font-size="12" font-weight="700" fill="#8B7000">Tier 2: Semantic</text>
  <text x="450" y="754" text-anchor="middle" font-size="10" fill="#6A6A8A">~6,920 embedded labels</text>
  <text x="450" y="768" text-anchor="middle" font-size="10" fill="#6A6A8A">cosine similarity search</text>

  <!-- Tier 3 -->
  <rect x="572" y="716" width="200" height="60" rx="8" fill="#FFF8E1" stroke="#FFD93D" stroke-width="1.2"/>
  <text x="672" y="737" text-anchor="middle" font-size="12" font-weight="700" fill="#8B7000">Tier 3: Episodic</text>
  <text x="672" y="754" text-anchor="middle" font-size="10" fill="#6A6A8A">Every past resolution</text>
  <text x="672" y="768" text-anchor="middle" font-size="10" fill="#6A6A8A">cached with confidence</text>

  <!-- Tier 4 -->
  <rect x="794" y="716" width="200" height="60" rx="8" fill="#FFF8E1" stroke="#FFD93D" stroke-width="1.2"/>
  <text x="894" y="737" text-anchor="middle" font-size="12" font-weight="700" fill="#8B7000">Tier 4: Knowledge</text>
  <text x="894" y="754" text-anchor="middle" font-size="10" fill="#6A6A8A">Synonym / variant triples</text>
  <text x="894" y="768" text-anchor="middle" font-size="10" fill="#6A6A8A">in SQLite graph</text>

  <!-- Resolution Priority bar -->
  <text x="570" y="806" text-anchor="middle" font-size="11.5" font-weight="600" fill="#5A4A00">Resolution Priority:</text>

  <rect x="185" y="816" width="100" height="28" rx="7" fill="#6C63FF"/>
  <text x="235" y="835" text-anchor="middle" font-size="11" font-weight="600" fill="white">Episodic</text>

  <text x="302" y="835" text-anchor="middle" font-size="16" fill="#9B9BC0">&#8594;</text>

  <rect x="320" y="816" width="150" height="28" rx="7" fill="#4ECDC4"/>
  <text x="395" y="835" text-anchor="middle" font-size="11" font-weight="600" fill="white">Knowledge Graph</text>

  <text x="487" y="835" text-anchor="middle" font-size="16" fill="#9B9BC0">&#8594;</text>

  <rect x="505" y="816" width="150" height="28" rx="7" fill="#FF6B6B"/>
  <text x="580" y="835" text-anchor="middle" font-size="11" font-weight="600" fill="white">Semantic + LLM</text>

  <text x="672" y="835" text-anchor="middle" font-size="16" fill="#9B9BC0">&#8594;</text>

  <rect x="690" y="816" width="170" height="28" rx="7" fill="#45B7D1"/>
  <text x="775" y="835" text-anchor="middle" font-size="11" font-weight="600" fill="white">Deterministic Rules</text>

</svg>
