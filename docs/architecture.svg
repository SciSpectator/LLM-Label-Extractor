<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1400 900" width="100%" preserveAspectRatio="xMidYMid meet"
     font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif">

  <!-- DEFS -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#37474F"/>
    </marker>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.2"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gP1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="gP1b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/><stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="gP1c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/><stop offset="100%" stop-color="#FFECB3"/>
    </linearGradient>
    <linearGradient id="gP2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="gIO" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ECEFF1"/><stop offset="100%" stop-color="#CFD8DC"/>
    </linearGradient>
    <linearGradient id="gMem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/><stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <linearGradient id="gWd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/><stop offset="100%" stop-color="#F8BBD0"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="900" fill="#FAFAFC"/>

  <!-- Title -->
  <text x="700" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#1F3A5F">
    TAILS — llm_extractor.py Pipeline
  </text>
  <text x="700" y="68" text-anchor="middle" font-size="13" fill="#607D8B">
    Tissue · Condition · Treatment extraction and canonicalization from GEO microarray metadata
  </text>

  <!-- INPUT -->
  <g filter="url(#soft-shadow)">
    <rect x="40" y="110" width="180" height="80" rx="10" ry="10" fill="url(#gIO)" stroke="#546E7A" stroke-width="1.5"/>
  </g>
  <text x="130" y="142" text-anchor="middle" font-size="14" font-weight="700" fill="#263238">INPUT</text>
  <text x="130" y="164" text-anchor="middle" font-size="11.5" fill="#37474F">GEOmetadb.sqlite</text>
  <text x="130" y="180" text-anchor="middle" font-size="10" fill="#546E7A">GSM + GSE metadata (~19 GB)</text>

  <path d="M 220 150 L 270 150" stroke="#37474F" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- PHASE 1 -->
  <g filter="url(#soft-shadow)">
    <rect x="270" y="95" width="280" height="260" rx="12" ry="12" fill="url(#gP1)" stroke="#1976D2" stroke-width="2"/>
  </g>
  <text x="410" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#0D47A1">Phase 1 — Raw Extraction</text>
  <text x="410" y="138" text-anchor="middle" font-size="10.5" fill="#1565C0">3 per-label agents in parallel · ~0.88 s/sample</text>

  <rect x="290" y="155" width="80" height="56" rx="6" ry="6" fill="#FFFFFF" stroke="#1976D2"/>
  <text x="330" y="176" text-anchor="middle" font-size="11" font-weight="700" fill="#0D47A1">Tissue</text>
  <text x="330" y="193" text-anchor="middle" font-size="9" fill="#455A64">agent</text>
  <text x="330" y="205" text-anchor="middle" font-size="8.5" fill="#607D8B">gemma4:e2b</text>

  <rect x="375" y="155" width="80" height="56" rx="6" ry="6" fill="#FFFFFF" stroke="#1976D2"/>
  <text x="415" y="176" text-anchor="middle" font-size="11" font-weight="700" fill="#0D47A1">Condition</text>
  <text x="415" y="193" text-anchor="middle" font-size="9" fill="#455A64">agent</text>
  <text x="415" y="205" text-anchor="middle" font-size="8.5" fill="#607D8B">think=False</text>

  <rect x="460" y="155" width="80" height="56" rx="6" ry="6" fill="#FFFFFF" stroke="#1976D2"/>
  <text x="500" y="176" text-anchor="middle" font-size="11" font-weight="700" fill="#0D47A1">Treatment</text>
  <text x="500" y="193" text-anchor="middle" font-size="9" fill="#455A64">agent</text>
  <text x="500" y="205" text-anchor="middle" font-size="8.5" fill="#607D8B">per-label prompt</text>

  <text x="410" y="240" text-anchor="middle" font-size="10.5" fill="#263238">Input: gsm_title, source, characteristics, description</text>
  <text x="410" y="256" text-anchor="middle" font-size="10.5" fill="#263238">"Multiple values → semicolon-separated"</text>
  <text x="410" y="275" text-anchor="middle" font-size="10" font-style="italic" fill="#1565C0">Verbatim extraction — no normalization</text>

  <rect x="310" y="290" width="200" height="46" rx="6" ry="6" fill="#FFFFFF" stroke="#90A4AE" stroke-dasharray="3,2"/>
  <text x="410" y="308" text-anchor="middle" font-size="10" font-weight="700" fill="#455A64">Checkpoint</text>
  <text x="410" y="324" text-anchor="middle" font-size="9.5" fill="#546E7A">phase1_extracted.json · every 5,000</text>

  <path d="M 550 225 L 620 225" stroke="#37474F" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- PHASE 1b -->
  <g filter="url(#soft-shadow)">
    <rect x="620" y="95" width="260" height="260" rx="12" ry="12" fill="url(#gP1b)" stroke="#F57C00" stroke-width="2"/>
  </g>
  <text x="750" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#E65100">Phase 1b — NS Inference</text>
  <text x="750" y="138" text-anchor="middle" font-size="10.5" fill="#EF6C00">GSEInferencer · KV-cached system prompt (~40% faster)</text>

  <rect x="640" y="155" width="220" height="24" rx="4" ry="4" fill="#FFFFFF" stroke="#F57C00"/>
  <text x="750" y="172" text-anchor="middle" font-size="10.5" fill="#E65100">GSE title · summary · design</text>
  <rect x="640" y="185" width="220" height="24" rx="4" ry="4" fill="#FFFFFF" stroke="#F57C00"/>
  <text x="750" y="202" text-anchor="middle" font-size="10.5" fill="#E65100">per-label inference rules</text>
  <rect x="640" y="215" width="220" height="24" rx="4" ry="4" fill="#FFFFFF" stroke="#F57C00"/>
  <text x="750" y="232" text-anchor="middle" font-size="10.5" fill="#E65100">re-infer only NS fields</text>

  <text x="750" y="268" text-anchor="middle" font-size="10.5" fill="#263238">If experiment studies a disease → sample has it</text>
  <text x="750" y="284" text-anchor="middle" font-size="10.5" fill="#263238">Control in disease study → Condition = Control</text>
  <text x="750" y="305" text-anchor="middle" font-size="10" font-style="italic" fill="#EF6C00">System prompts KV-cached by Ollama</text>

  <rect x="670" y="315" width="160" height="28" rx="4" ry="4" fill="#FFFFFF" stroke="#90A4AE" stroke-dasharray="3,2"/>
  <text x="750" y="333" text-anchor="middle" font-size="10" fill="#546E7A">checkpoint · every 2,000</text>

  <path d="M 880 225 L 950 225" stroke="#37474F" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- PHASE 1c -->
  <g filter="url(#soft-shadow)">
    <rect x="950" y="95" width="260" height="260" rx="12" ry="12" fill="url(#gP1c)" stroke="#F9A825" stroke-width="2"/>
  </g>
  <text x="1080" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#F57F17">Phase 1c — Full Re-extract</text>
  <text x="1080" y="138" text-anchor="middle" font-size="10.5" fill="#F57F17">Fallback for persistent NS · ZERO truncation</text>

  <rect x="970" y="155" width="220" height="130" rx="6" ry="6" fill="#FFFFFF" stroke="#F9A825"/>
  <text x="1080" y="175" text-anchor="middle" font-size="10.5" font-weight="700" fill="#F57F17">Full metadata prompt</text>
  <text x="1080" y="196" text-anchor="middle" font-size="10" fill="#455A64">· title + source + characteristics</text>
  <text x="1080" y="212" text-anchor="middle" font-size="10" fill="#455A64">· description + treatment_protocol</text>
  <text x="1080" y="228" text-anchor="middle" font-size="10" fill="#455A64">· GSE title / summary / design</text>
  <text x="1080" y="252" text-anchor="middle" font-size="10" fill="#263238" font-style="italic">num_ctx = 4,096</text>
  <text x="1080" y="268" text-anchor="middle" font-size="10" fill="#263238" font-style="italic">no [:N] slicing anywhere</text>

  <text x="1080" y="310" text-anchor="middle" font-size="10.5" fill="#F57F17" font-weight="700">Only fires for residual NS samples</text>

  <path d="M 1080 355 L 1080 400" stroke="#37474F" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- PHASE 2 -->
  <g filter="url(#soft-shadow)">
    <rect x="270" y="420" width="940" height="220" rx="12" ry="12" fill="url(#gP2)" stroke="#2E7D32" stroke-width="2"/>
  </g>
  <text x="740" y="448" text-anchor="middle" font-size="16" font-weight="700" fill="#1B5E20">Phase 2 — Retrieval-augmented LLM Collapse (CollapseWorker)</text>
  <text x="740" y="467" text-anchor="middle" font-size="11" fill="#2E7D32">Per-GSE working memory · global episodic across runs · normalizes raw → canonical cluster</text>

  <rect x="300" y="485" width="270" height="135" rx="10" ry="10" fill="#FFFFFF" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="435" y="510" text-anchor="middle" font-size="13" font-weight="700" fill="#1B5E20">1. Episodic cache</text>
  <text x="435" y="532" text-anchor="middle" font-size="10.5" fill="#455A64">working_mem (this GSE)</text>
  <text x="435" y="548" text-anchor="middle" font-size="10.5" fill="#455A64">+ global episodic (all runs)</text>
  <rect x="330" y="560" width="210" height="28" rx="4" ry="4" fill="#E8F5E9" stroke="#81C784"/>
  <text x="435" y="578" text-anchor="middle" font-size="11" font-weight="700" fill="#1B5E20">&lt;1 ms · ~55% hit rate</text>
  <text x="435" y="606" text-anchor="middle" font-size="9.5" fill="#607D8B" font-style="italic">(col, raw_lower) → canonical</text>

  <path d="M 570 552 L 620 552" stroke="#37474F" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
  <text x="595" y="545" text-anchor="middle" font-size="9.5" fill="#607D8B">miss</text>

  <rect x="620" y="485" width="270" height="135" rx="10" ry="10" fill="#FFFFFF" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="755" y="510" text-anchor="middle" font-size="13" font-weight="700" fill="#1B5E20">2. Semantic retrieval</text>
  <text x="755" y="530" text-anchor="middle" font-size="10.5" fill="#455A64">BioLORD-2023-C</text>
  <text x="755" y="546" text-anchor="middle" font-size="10.5" fill="#455A64">top-20 candidates</text>
  <text x="755" y="562" text-anchor="middle" font-size="10.5" fill="#455A64">cosine similarity</text>
  <rect x="650" y="575" width="210" height="28" rx="4" ry="4" fill="#E8F5E9" stroke="#81C784"/>
  <text x="755" y="593" text-anchor="middle" font-size="11" font-weight="700" fill="#1B5E20">~17 ms · CPU</text>

  <path d="M 890 552 L 940 552" stroke="#37474F" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>

  <rect x="940" y="485" width="250" height="135" rx="10" ry="10" fill="#FFFFFF" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="1065" y="510" text-anchor="middle" font-size="13" font-weight="700" fill="#1B5E20">3. LLM pick</text>
  <text x="1065" y="530" text-anchor="middle" font-size="10.5" fill="#455A64">gemma4:e2b, think=False</text>
  <text x="1065" y="546" text-anchor="middle" font-size="10.5" fill="#455A64">GSE context in system prompt</text>
  <text x="1065" y="562" text-anchor="middle" font-size="10.5" fill="#455A64">picks best of 20 · or NEW:</text>
  <rect x="970" y="575" width="190" height="28" rx="4" ry="4" fill="#E8F5E9" stroke="#81C784"/>
  <text x="1065" y="593" text-anchor="middle" font-size="11" font-weight="700" fill="#1B5E20">~700 ms · temperature 0</text>

  <path d="M 1080 640 L 1080 680 L 1270 680 L 1270 150 L 1195 150" stroke="#37474F" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- OUTPUT -->
  <g filter="url(#soft-shadow)">
    <rect x="1195" y="110" width="180" height="80" rx="10" ry="10" fill="url(#gIO)" stroke="#546E7A" stroke-width="1.5"/>
  </g>
  <text x="1285" y="142" text-anchor="middle" font-size="14" font-weight="700" fill="#263238">OUTPUT</text>
  <text x="1285" y="164" text-anchor="middle" font-size="11" fill="#37474F">labels_final.csv</text>
  <text x="1285" y="180" text-anchor="middle" font-size="10" fill="#546E7A">collapse_report.csv</text>

  <!-- MEMORY AGENT -->
  <g filter="url(#soft-shadow)">
    <rect x="40" y="700" width="380" height="160" rx="12" ry="12" fill="url(#gMem)" stroke="#7B1FA2" stroke-width="2"/>
  </g>
  <text x="230" y="726" text-anchor="middle" font-size="14" font-weight="700" fill="#4A148C">MemoryAgent — biomedical_memory.db</text>
  <text x="230" y="743" text-anchor="middle" font-size="10.5" fill="#6A1B9A">4-tier memory · shared across runs</text>

  <rect x="55" y="755" width="170" height="46" rx="4" ry="4" fill="#FFFFFF" stroke="#BA68C8"/>
  <text x="65" y="772" font-size="10.5" fill="#4A148C" font-weight="700">Tier 1 · Core</text>
  <text x="65" y="788" font-size="10.5" fill="#455A64">top-50 labels in prompt</text>

  <rect x="235" y="755" width="170" height="46" rx="4" ry="4" fill="#FFFFFF" stroke="#BA68C8"/>
  <text x="245" y="772" font-size="10.5" fill="#4A148C" font-weight="700">Tier 2 · Semantic</text>
  <text x="245" y="788" font-size="10.5" fill="#455A64">~6,920 embeddings (BioLORD)</text>

  <rect x="55" y="807" width="170" height="46" rx="4" ry="4" fill="#FFFFFF" stroke="#BA68C8"/>
  <text x="65" y="824" font-size="10.5" fill="#4A148C" font-weight="700">Tier 3 · Episodic</text>
  <text x="65" y="840" font-size="10.5" fill="#455A64">past resolutions + confidence</text>

  <rect x="235" y="807" width="170" height="46" rx="4" ry="4" fill="#FFFFFF" stroke="#BA68C8"/>
  <text x="245" y="824" font-size="10.5" fill="#4A148C" font-weight="700">Tier 4 · Knowledge Graph</text>
  <text x="245" y="840" font-size="10.5" fill="#455A64">synonym / variant triples</text>

  <path d="M 230 700 C 230 400 260 400 410 420" stroke="#8E6CA6" stroke-width="1.5" stroke-dasharray="5,4" fill="none" opacity="0.7"/>
  <path d="M 300 700 C 500 400 650 400 750 420" stroke="#8E6CA6" stroke-width="1.5" stroke-dasharray="5,4" fill="none" opacity="0.7"/>
  <path d="M 420 780 C 600 780 740 680 740 640" stroke="#8E6CA6" stroke-width="1.5" stroke-dasharray="5,4" fill="none" opacity="0.7"/>

  <!-- WATCHDOG -->
  <g filter="url(#soft-shadow)">
    <rect x="460" y="700" width="400" height="160" rx="12" ry="12" fill="url(#gWd)" stroke="#C2185B" stroke-width="2"/>
  </g>
  <text x="660" y="726" text-anchor="middle" font-size="14" font-weight="700" fill="#880E4F">Watchdog — Fluid Agent Scaling</text>
  <text x="660" y="743" text-anchor="middle" font-size="10.5" fill="#AD1457">never-pause · scale-up / scale-down every 3 s</text>

  <rect x="475" y="755" width="185" height="40" rx="4" ry="4" fill="#FFFFFF" stroke="#F06292"/>
  <text x="485" y="772" font-size="10.5" fill="#880E4F" font-weight="700">CPU / RAM monitor</text>
  <text x="485" y="787" font-size="10.5" fill="#455A64">scale down when hot (90%/50%)</text>

  <rect x="670" y="755" width="180" height="40" rx="4" ry="4" fill="#FFFFFF" stroke="#F06292"/>
  <text x="680" y="772" font-size="10.5" fill="#880E4F" font-weight="700">VRAM + temp guard</text>
  <text x="680" y="787" font-size="10.5" fill="#455A64">hard pause at 90% / 85 °C</text>

  <rect x="475" y="800" width="185" height="40" rx="4" ry="4" fill="#FFFFFF" stroke="#F06292"/>
  <text x="485" y="817" font-size="10.5" fill="#880E4F" font-weight="700">Scale-up step</text>
  <text x="485" y="832" font-size="10.5" fill="#455A64">+1 worker when idle</text>

  <rect x="670" y="800" width="180" height="40" rx="4" ry="4" fill="#FFFFFF" stroke="#F06292"/>
  <text x="680" y="817" font-size="10.5" fill="#880E4F" font-weight="700">Hot-reload config</text>
  <text x="680" y="832" font-size="10.5" fill="#455A64">live GUI retune · no restart</text>

  <path d="M 660 700 C 660 400 490 420 410 420" stroke="#E57373" stroke-width="1.5" stroke-dasharray="5,4" fill="none" opacity="0.7"/>
  <path d="M 700 700 C 700 400 800 400 750 420" stroke="#E57373" stroke-width="1.5" stroke-dasharray="5,4" fill="none" opacity="0.7"/>
  <path d="M 700 700 C 900 600 950 580 940 552" stroke="#E57373" stroke-width="1.5" stroke-dasharray="5,4" fill="none" opacity="0.7"/>

  <!-- OLLAMA -->
  <g filter="url(#soft-shadow)">
    <rect x="900" y="700" width="300" height="160" rx="12" ry="12" fill="#FFFFFF" stroke="#455A64" stroke-width="2"/>
  </g>
  <text x="1050" y="726" text-anchor="middle" font-size="14" font-weight="700" fill="#263238">Ollama (local LLM server)</text>
  <text x="1050" y="743" text-anchor="middle" font-size="10.5" fill="#546E7A">localhost:11434 · keep_alive=-1</text>

  <rect x="920" y="755" width="260" height="36" rx="4" ry="4" fill="#FAFAFA" stroke="#90A4AE"/>
  <text x="1050" y="778" text-anchor="middle" font-size="10.5" fill="#263238">gemma4:e2b · 7.2 GB VRAM · think=False</text>

  <rect x="920" y="795" width="260" height="32" rx="4" ry="4" fill="#FAFAFA" stroke="#90A4AE"/>
  <text x="1050" y="816" text-anchor="middle" font-size="10.5" fill="#263238">KV cache reuse · OLLAMA_NUM_PARALLEL=3</text>

  <rect x="920" y="830" width="260" height="24" rx="4" ry="4" fill="#FAFAFA" stroke="#90A4AE"/>
  <text x="1050" y="847" text-anchor="middle" font-size="9.5" fill="#455A64">BioLORD-2023-C runs on CPU (sentence-transformers)</text>

  <!-- Legend -->
  <line x1="40" y1="880" x2="70" y2="880" stroke="#37474F" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="78" y="884" font-size="10" fill="#455A64">data flow</text>

  <line x1="170" y1="880" x2="200" y2="880" stroke="#8E6CA6" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="208" y="884" font-size="10" fill="#455A64">memory lookup</text>

  <line x1="310" y1="880" x2="340" y2="880" stroke="#E57373" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="348" y="884" font-size="10" fill="#455A64">watchdog gate</text>

  <text x="1390" y="884" text-anchor="end" font-size="10" fill="#90A4AE" font-style="italic">
    v2.2 · commit 3b90ea2 · multi-label composite preserved in Phase 2
  </text>
</svg>
